<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Cards</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/bootstrap-cards/style.css">
</head>

<body>

<div class="container mt-5">
    <div class="row g-4">

        <div class="col-md-4">
            <div class="card bg-black">
                <img src="/bootstrap-cards/images/pizza.jpg" class="card-img-top" alt="Pizza">
                <div class="card-body">
                    <h3 class="card-title text-light">Cheese Pizza</h3>
                    <p class="card-text text-light">
                        Delicious cheese pizza with fresh vegetables and extra cheese.
                    </p>
                    <a href="#" class="btn btn-warning">Order Now</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-black">
                <img src="/bootstrap-cards/images/burger.jpg" class="card-img-top" alt="Burger">
                <div class="card-body">
                    <h3 class="card-title text-light">Chicken Burger</h3>
                    <p class="card-text text-light">
                        Crispy chicken burger served with cheese and fresh vegetables.
                    </p>
                    <a href="#" class="btn btn-warning">Order Now</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card bg-black">
                <img src="/bootstrap-cards/images/panipuri.jpg" class="card-img-top" alt="Pani Puri">
                <div class="card-body">
                    <h3 class="card-title text-light">Pani Puri</h3>
                    <p class="card-text text-light">
                        Crispy pani puri filled with spicy and tangy flavored water.
                    </p>
                    <a href="#" class="btn btn-warning">Order Now</a>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
