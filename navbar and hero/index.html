<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Center</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="/navbar and hero/style.css">
    
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">

        <a class="navbar-brand" href="#">
            <i class="bi bi-bag-heart-fill text-warning"></i> ShopCenter
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Categories</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Offers</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>

            </ul>

            <div class="d-flex">

                <button class="btn btn-outline-light me-2">
                    <i class="bi bi-search"></i>
                </button>

                <button class="btn btn-outline-light me-2">
                    <i class="bi bi-cart3"></i>
                </button>

                <button class="btn btn-shop">
                    Login
                </button>

            </div>

        </div>

    </div>
</nav>

<!-- Hero Section -->

<section class="hero">

    <div class="container">

        <div class="row">

            <div class="col-lg-7">

                <h1 class="display-3 fw-bold">
                    Welcome to ShopCenter
                </h1>

                <p class="lead my-4">
                    Discover the latest fashion, electronics,
                    lifestyle products, and exclusive offers
                    at unbeatable prices.
                </p>

                <a href="#" class="btn btn-warning btn-lg me-3">
                    Shop Now
                </a>

                <a href="#" class="btn btn-outline-light btn-lg">
                    Explore
                </a>

            </div>

        </div>

    </div>

</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
